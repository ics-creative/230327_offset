<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apple-style Animation | CSS Offset Demos</title>
    <link rel="stylesheet" href="./styles/base.css">
    <style>
    .wrapper__hello {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        150deg,
        oklch(81.921% 0.20569 124.925) 0%,
        oklch(66.582% 0.22166 21.295) 100%
      );
      opacity: 0.8;
      animation: gradation 8s infinite alternate;

      .hello-text {
        fill: oklch(100% 0 0);
      }

      .hello-mask-line {
        fill: none;
        stroke: oklch(100% 0 0);
        stroke-width: 8px;
        stroke-dasharray: 2400px;
        stroke-linecap: round;
        stroke-linejoin: round;
        animation: hello 3.5s infinite linear;
      }
    }

    @keyframes hello {
      0% {
        stroke-dashoffset: 2400px;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes gradation {
      0% {
        filter: hue-rotate(0deg);
      }
      100% {
        filter: hue-rotate(360deg);
      }
    }
    </style>
  </head>
