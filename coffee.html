<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staggered Text | CSS Offset Demos</title>
    <link rel="stylesheet" href="./styles/base.css">
    <style>
    .coffee {
      position: relative;
      display: flex;
      justify-content: center;

      .coffee_text {
        position: absolute;
        bottom: 240px;
        width: 136px;
        color: #47443b;
        font-family: serif;

        span {
          position: absolute;
          display: block;
          font-size: 1rem;
          offset-path: path(
            "m61.498,27.295c9.366,9.437,4.071,22.205-6.929,23.205-10.006.91-19.834-7.567-19.834-23.475,0-13,12.942-24.525,31.834-24.525,18.704,0,25.174,19.976,25,32-.231,16.017-7.03,24.708-13,34-18.22,28.357-18.22,49.926-13,58"
          );
          opacity: 0;
          animation:
            move-text 3.2s linear infinite,
            distort-text 3.2s linear infinite;
          animation-delay: calc(sibling-index() * 0.1s);
        }
      }

      .coffee_cup {
        position: absolute;
        bottom: 20px;
        display: block;
        width: 136px;
        height: 100px;
        background-image: url("./images/coffee/coffee_cup.png");
        background-repeat: no-repeat;
        background-size: contain;
      }
    }

    @keyframes move-text {
      0% {
        offset-distance: 100%;
        opacity: 0;
      }
      10%,
      90% {
        opacity: 1;
      }
      100% {
        offset-distance: 0;
        opacity: 0;
      }
    }

    @keyframes distort-text {
      45% {
        scale: 1;
      }
      65% {
        scale: 1 1.8;
      }
      85% {
        scale: 1;
      }
      100% {
        scale: 1 0.5;
      }
    }
    </style>
  </head>

  <body>
    <main class="contents">
      <section class="demo">
        <div class="wrapper coffee">
          <div class="coffee_text">
            <span>L</span>
            <span>e</span>
            <span>t'</span>
            <span>s</span>
            <span></span>
            <span>T</span>
            <span>a</span>
            <span>k</span>
            <span>e</span>
            <span></span>
            <span>a</span>
            <span></span>
            <span>b</span>
            <span>r</span>
            <span>e</span>
            <span>a</span>
            <span>k</span>
          </div>

          <span class="coffee_cup"></span>
        </div>
      </section>
    </main>
  </body>
</html>
