<!DOCTYPE html>

  <head>
    <meta charset="UTF-8">

    <title>Ferris Wheel / 観覧車 | CSS Offset Demos</title>
    <link rel="stylesheet" href="./styles/base.css">
    <style>
    .wrapper__amusementPark {
      position: relative;
      height: 300px;
      overflow: hidden;
      background-image: linear-gradient(var(--main-color) 0%, #1acdff 120%);

      .rollerCoaster {
        pointer-events: none;

        .rollerCoaster_vehicle {
          position: relative;
          left: 50%;
          width: 790px;
          height: 300px;
          translate: -50%;

          .rollerCoaster_vehicle_item {
            position: absolute;
            display: block;
            width: 16px;
            height: 8px;
            background-color: #1479b7;
            border-radius: 2px;
            offset-path: path(
              "m2.63,209.053C52.632,174.606,73.712,77.114,132.52,52.907c74.773-30.779,12.771,192.822,73.211,202.529,54.714,8.787,52.963-109.401,107.94-109.401,25.342,0,37.3,45.413,41.674,61.454,11.961,43.86,53.559,62.85,70.843,67.476,38.803,10.386,86.598,3.102,110.783-7.36,35.38-15.305,63.534-40.31,79.3-75.913,8.186-18.486,26.224-109.706-43.594-110.659-55.836-.762-59.496,65.968-46.686,99.027,35.952,92.781,261.608,68.707,261.608,68.707V114.533c-96.886-8.899-77.985,90.427-151.986,100.397-33.848,4.56-38.351-89.16-72.384-86.308-32.323,2.709-28.707,116.35-76.631,107.791-18.446-3.294-22.221-82.948-53.338-79.039-46.123,5.794-54.515,96.254-87.623,97.405-99.677,3.467-73.265-152.889-131.541-151.449-41.27,1.02-77.234,61.548-94.523,94.17C78.307,275.366,31.004,272.669,1.6,274.757"
            );
            animation: move 14s infinite linear;
            animation-delay: calc(0.1s * (sibling-index() - 1));
          }
        }

        .rollerCoaster_rail {
          position: absolute;
          top: 1px;
          left: 50%;
          display: block;
          width: 790px;
          height: 300px;
          background-image: url("./images/amusementPark/rail.svg");
          translate: -50%;
        }
      }

      .ferrisWheel {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 200px;
        height: 250px;
        translate: -50%;

        .ferrisWheel_gondola {
          position: absolute;
          width: 40px;
          height: 40px;
          cursor: pointer;
          fill: hsl(calc(15deg + (sibling-index() - 1) * 36deg) 100% 80%);
          offset-path: path(
            "M100,0 A100,100 0 1,1 100,200 A100,100 0 1,1 100,0 Z"
          );
          offset-rotate: 0deg;
          animation: rotate-gondola 40s linear infinite;
          translate: 0 20px;
          touch-action: manipulation;

          .gondola {
            width: inherit;
            height: inherit;
            transform-origin: top center;
          }

          @media (any-hover: hover) {
            &:hover > .gondola {
              animation: swing-gondola 0.8s ease-out;
            }
          }

          @media (any-hover: none) {
            &:active > .gondola {
              animation: swing-gondola 0.8s ease-out;
            }
          }
        }

        :is(.ferrisWheel_wheel, .ferrisWheel_frame) {
          position: absolute;
          display: block;
          width: 200px;
          pointer-events: none;
        }

        .ferrisWheel_wheel {
          height: 200px;
          background-image: url("./images/amusementPark/ferriswheel_wheel.svg");
          animation: rotate-wheel 40s linear infinite;
        }

        .ferrisWheel_frame {
          height: 250px;
          background-image: url("./images/amusementPark/ferriswheel_frame.svg");
        }
      }
    }

    @keyframes move {
      to {
        offset-distance: 100%;
      }
    }

    @keyframes rotate-gondola {
      from {
        offset-distance: calc(10% * (sibling-index() - 1));
      }
      to {
        offset-distance: calc(100% + 10% * (sibling-index() - 1));
      }
    }

    @keyframes swing-gondola {
      10% {
        rotate: 45deg;
      }
      35% {
        rotate: -38deg;
      }
      55% {
        rotate: 25deg;
      }
      70% {
        rotate: -15deg;
      }
      90% {
        rotate: 5deg;
      }
    }

    @keyframes rotate-wheel {
      to {
        rotate: 360deg;
      }
    }
    </style>
  </head>
